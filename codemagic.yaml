workflows:
  ios-simulator-build:
    name: DraftIQ iOS Simulator Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20.19.4
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Build iOS app for simulator
        script: |
          cd ios
          xcodebuild build \
            -workspace DraftIQ.xcworkspace \
            -scheme DraftIQ \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/build/Build/Products/Debug-iphonesimulator/DraftIQ.app
      - ios/build/Build/Products/Debug-iphonesimulator/*.app

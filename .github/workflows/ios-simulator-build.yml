name: Build iOS Simulator

on:
  workflow_dispatch:  # Manual trigger from the Actions tab
  push:
    branches:
      - main
      - claude/build-draftiq-app-rIRO0

jobs:
  build-ios-simulator:
    name: Build DraftIQ for iOS Simulator
    runs-on: macos-14   # macOS 14 runner with Xcode 15.x

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Generate iOS project from Expo config
        run: npx expo prebuild --clean -p ios

      - name: Install CocoaPods dependencies
        run: cd ios && pod install

      - name: Build iOS app for Simulator
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY:               ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN:           ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID:            ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET:        ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:   ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID:                ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID:           ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_GEMINI_API_KEY:                 ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}
        run: |
          cd ios
          xcodebuild build \
            -workspace DraftIQ.xcworkspace \
            -scheme DraftIQ \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Find built .app
        id: find_app
        run: |
          APP_PATH=$(find ios/build/Build/Products/Debug-iphonesimulator -name "*.app" -maxdepth 1 | head -1)
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found: $APP_PATH"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: DraftIQ-Simulator-App
          path: ${{ steps.find_app.outputs.app_path }}
          retention-days: 7
